<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register – Shopsite</title>
  <style>
    body { font-family: Georgia, serif; margin: 2rem; background: #f7f5ef; color: #22303c; }
    main { max-width: 26rem; margin: 4rem auto; background: #fffdf8; padding: 2rem; border: 1px solid #d8cfbf; }
    h1 { margin-top: 0; }
    label { display: block; margin-top: 1rem; font-weight: bold; }
    input { width: 100%; box-sizing: border-box; padding: 0.4rem; margin-top: 0.25rem; border: 1px solid #c0b8aa; }
    button { margin-top: 1.25rem; background: #8c3d1f; color: #fff; border: none; padding: 0.5rem 1.25rem; cursor: pointer; font-size: 1rem; }
    a { color: #8c3d1f; text-decoration: none; }
    .hint { margin-top: 1rem; font-size: 0.9rem; }
    ul.errorlist { color: #a00; padding-left: 1.25rem; }
    .helptext { font-size: 0.8rem; color: #666; }
    .messages { list-style: none; padding: 0; margin: 0 0 1rem 0; }
    .message { padding: 0.6rem 1rem; border-left: 4px solid; margin-bottom: 0.4rem; }
    .message-success { background: #f0f7f0; border-color: #4a8c4a; color: #2d5a2d; }
    .message-error   { background: #fdf0f0; border-color: #c0392b; color: #7a1e1e; }
  </style>
</head>
<body>
  <main>
    <h1>Create an account</h1>

    {% if messages %}
      <ul class="messages">
        {% for message in messages %}
          <li class="message message-{{ message.tags }}">{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Register</button>
    </form>

    <p class="hint">Already have an account? <a href="{% url 'login' %}">Log in here</a>.</p>
    <p class="hint"><a href="{% url 'item_list' %}">Continue as guest</a></p>
  </main>
</body>
</html>
